<h2>Employees Attendance</h2>

<table border="1" width="100%">
  <tr>
    <th>Name</th>
    <th>Date</th>
    <th>Check In</th>
    <th>Check Out</th>
  </tr>

  <tr *ngFor="let e of employees"
  [ngClass]="getStatus(e)">
<td>{{ e[0] }}</td>
<td>{{ e[1] }}</td>
<td>{{ e[2] }}</td>
<td>{{ e[3] }}</td>

</tr>

</table>
